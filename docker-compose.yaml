version: '3.8'

services:
  db:
    image: postgres:14.6-alpine
    restart: always
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    container_name: app_container
    volumes:
      -  ./postgres:/var/lib/postgresql/data
